name: Fork Sync

on:
  schedule:
    - cron: '0 1 * * 6' # every Saturday, 1AM
  workflow_dispatch: # on button click

jobs:
  sync:

    runs-on: ubuntu-latest

    steps:
      - uses: ZigmundRat/fork-sync@V2.0.10
        with:
          owner: ZigmundRat
          base: master
          head: master
          max_attempts: 2
